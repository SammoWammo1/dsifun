<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSi Fun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        header {
            background: #707070;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        nav {
            background: #333;
            padding: 1rem;
        }
        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <main>
        <p id="Score">Score: 0</p><br><p id="Lives">Lives: 3</p>
        <button id="button1">Can't Whack yet...</button><button id="button2">Can't Whack yet...</button><button id="button3">Can't Whack yet...</button><br>
        <button id="button4">Can't Whack yet...</button><button id="button5">Can't Whack yet...</button><button id="button6">Can't Whack yet...</button><br>
        <button id="startButton">Start Game</button>
        <script>
            const buttons = ["button1", "button2", "button3", "button4", "button5", "button6"];
            let score = 0;
            let lives = 3;
            let gameInterval = 0;
            let activeButton = -1;
            let gameActive = false;

            while (true) {

                document.getElementById("startButton").addEventListener("click", function() {
                    gameActive = true
                    score = 0
                    lives = 3
                    document.getElementById("Score").innerText = "Score: " + score
                    document.getElementById("Lives").innerText = "Lives: " + lives
                    document.getElementById("startButton").innerText = "Reset Game"
                    gameInterval = 0
                    alert("The Game has Begun!")
                });
            
                if (gameActive == true) {
                    gameInterval += 1
                    if (gameInterval >= 10000) {
                        alert("AAAA")
                        gameInterval = 0
                    }
                }
            }
        </script>
    </main>
</body>
