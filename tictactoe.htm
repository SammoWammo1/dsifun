<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSi Fun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        header {
            background: #707070;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        nav {
            background: #333;
            padding: 1rem;
        }
        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <p>How to play: X is you! Get 3 Xs in a row, vertically, horizontally or diagonally to win. O is the enemy. Don't let them get 3 in a row. 🔼 are blank spaces. That's where you place your Xs.</p>
    <button id="1">🔼</button><button id="2">🔼</button><button id="3">🔼</button><br>
    <button id="4">🔼</button><button id="5">🔼</button><button id="6">🔼</button><br>
    <button id="7">🔼</button><button id="8">🔼</button><button id="9">🔼</button><br>
    <p id="gamestate">Your turn.</p>
    <script>
        let boxes = [
            ["🔼","🔼","🔼"],
            ["🔼","🔼","🔼"],
            ["🔼","🔼","🔼"]
        ]

        for (let i = 1; i <= 9; i++) {
            document.getElementById(i).addEventListener("click", function() {
                const row = Math.floor((i - 1) / 3);
                const col = (i - 1) % 3;
                
                if (boxes[row][col] === "🔼") {
                    boxes[row][col] = "X";
                    document.getElementById(i).textContent = "X";
                    
                    if (checkWin("X")) {
                        document.getElementById("gamestate").textContent = "You win!";
                        setTimeout(() => {
                            boxes = [
                                ["🔼","🔼","🔼"],
                                ["🔼","🔼","🔼"],
                                ["🔼","🔼","🔼"]
                            ]
                            document.getElementById("gamestate").textContent = "Your turn.";
                            for (let i = 1; i <= 9; i++) {
                                document.getElementById(i).textContent = "🔼";
                            }
                        }, 2000);
                        return;
                    }
                    
                    document.getElementById("gamestate").textContent = "Enemy's turn.";
                    
                    // Simple AI: pick random empty space
                    setTimeout(() => {
                        let emptyCells = [];
                        for (let j = 1; j <= 9; j++) {
                            const r = Math.floor((j - 1) / 3);
                            const c = (j - 1) % 3;
                            if (boxes[r][c] === "🔼") {
                                emptyCells.push(j);
                            }
                        }
                        
                        if (emptyCells.length > 0) {
                            const randomId = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                            const r = Math.floor((randomId - 1) / 3);
                            const c = (randomId - 1) % 3;
                            boxes[r][c] = "O";
                            document.getElementById(randomId).textContent = "O";
                            
                            if (checkWin("O")) {
                                document.getElementById("gamestate").textContent = "Enemy wins!";
                                setTimeout(() => {
                                    boxes = [
                                        ["🔼","🔼","🔼"],
                                        ["🔼","🔼","🔼"],
                                        ["🔼","🔼","🔼"]
                                    ]
                                    document.getElementById("gamestate").textContent = "Your turn.";
                                    for (let i = 1; i <= 9; i++) {
                                        document.getElementById(i).textContent = "🔼";
                                    }
                                }, 2000);
                            } else {
                                document.getElementById("gamestate").textContent = "Your turn.";
                            }
                        }
                    }, 500);
                }
            });
        }

        function checkWin(player) {
            // Check rows
            for (let i = 0; i < 3; i++) {
                if (boxes[i][0] === player && boxes[i][1] === player && boxes[i][2] === player) {
                    return true;
                }
            }
            // Check columns
            for (let i = 0; i < 3; i++) {
                if (boxes[0][i] === player && boxes[1][i] === player && boxes[2][i] === player) {
                    return true;
                }
            }
            // Check diagonals
            if (boxes[0][0] === player && boxes[1][1] === player && boxes[2][2] === player) {
                return true;
            }
            if (boxes[0][2] === player && boxes[1][1] === player && boxes[2][0] === player) {
                return true;
            }
            return false;
        }
    </script>
</body>
